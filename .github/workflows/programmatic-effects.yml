name: Programmatic image effects

on:
  push:
    branches:
      - feature/programmatic-image-effects
  pull_request:
    paths:
      - "utils/effects/**"
      - "scripts/apply_effect_plan.py"
      - "scripts/render_simple_ffmpeg.py"
      - "scripts/render_simple_ffmpeg_legacy.py"
      - "scripts/check_effect_*.py"
      - "scripts/check_perspective_effect.py"
      - ".github/workflows/programmatic-effects.yml"

permissions:
  contents: read

jobs:
  effects:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install runtime dependency
        run: python -m pip install --upgrade pillow
      - name: Compile changed Python modules
        run: >-
          python -m py_compile
          utils/effects/registry.py
          utils/effects/perspective_push_in.py
          scripts/apply_effect_plan.py
          scripts/render_simple_ffmpeg.py
          scripts/render_simple_ffmpeg_legacy.py
          scripts/check_effect_timing.py
          scripts/check_perspective_effect.py
          scripts/check_effect_grouping.py
      - name: Check effect timing guardrails
        run: python scripts/check_effect_timing.py
      - name: Check perspective effect
        run: python scripts/check_perspective_effect.py --json
      - name: Check merged visual grouping
        run: python scripts/check_effect_grouping.py
