name: agent-test validation

on:
  push:
    branches:
      - agent-test
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: python -m pip install -e ".[dev]"

      - name: Compile Python
        run: python -m compileall -q agent_test video_agent

      - name: Run agent-test unit tests
        run: python -m pytest tests/test_agent_test.py

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            cdp-capture/package-lock.json
            remotion/package-lock.json

      - name: Validate CDP recorder syntax
        run: node --check cdp-capture/bin/agent-record.js

      - name: Install Remotion dependencies
        working-directory: remotion
        run: npm ci

      - name: Type-check Remotion
        working-directory: remotion
        run: npx tsc --noEmit
