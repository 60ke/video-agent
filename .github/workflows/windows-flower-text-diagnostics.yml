name: Windows flower-text diagnostics

on:
  push:
    branches:
      - agent/params-flower-text-animation
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Run tests and capture log
        id: pytest
        continue-on-error: true
        shell: pwsh
        run: |
          python -m pytest 2>&1 | Tee-Object -FilePath pytest-windows.log
          exit $LASTEXITCODE
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-windows-flower-text
          path: pytest-windows.log
