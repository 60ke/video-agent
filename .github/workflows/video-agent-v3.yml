name: Video Agent V3

on:
  push:
    branches: [master]
  pull_request:
    paths:
      - "video_agent/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/video-agent-v3.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Compile
        run: python -m compileall -q video_agent
      - name: Test
        run: python -m pytest
