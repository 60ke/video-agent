name: Video Agent V3

on:
  push:
    branches: [master]
  pull_request:
    paths:
      - "video_agent/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/video-agent-v3.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install Ubuntu media and CJK fonts
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends ffmpeg fonts-noto-cjk
      - name: Verify Ubuntu Chinese font resolution
        if: runner.os == 'Linux'
        run: fc-match -f '%{family}\n%{file}\n' 'Noto Sans CJK SC' | tee font-match.txt && grep -q 'Noto Sans CJK' font-match.txt
      - name: Install Windows FFmpeg
        if: runner.os == 'Windows'
        run: choco install ffmpeg -y --no-progress
      - name: Verify FFmpeg
        run: ffmpeg -version
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Compile
        run: python -m compileall -q video_agent
      - name: Ruff
        run: python -m ruff check .
      - name: Test
        id: tests
        continue-on-error: true
        run: python -m pytest -q --tb=short --junitxml=pytest-results.xml
      - name: Upload pytest results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results-${{ matrix.os }}
          path: pytest-results.xml
      - name: Enforce pytest result
        if: steps.tests.outcome == 'failure'
        run: python -c "raise SystemExit(1)"
