name: Validate parameter flower-text feature

on:
  push:
    branches:
      - agent/params-flower-text-animation
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install media and CJK fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-noto-cjk
      - name: Install project
        run: python -m pip install -e '.[dev]'
      - name: Compile
        run: python -m compileall -q video_agent tests
      - name: Ruff
        run: ruff check video_agent tests
      - name: Pytest
        id: pytest
        continue-on-error: true
        run: |
          set +e
          pytest -q 2>&1 | tee pytest.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit "$status"
      - name: Upload validation diagnostics and IP previews
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ip-params-flower-text-diagnostics
          if-no-files-found: warn
          path: |
            pytest.log
            assets/derived/sites/柯幻熊猫/文生图/参数面板/柯幻熊猫_文生图_IP形象_参数面板关键帧.png
            assets/derived/sites/柯幻熊猫/文生图/参数面板/layers/柯幻熊猫_文生图_IP形象_参数面板无花字底图.png
            assets/derived/sites/柯幻熊猫/文生图/参数面板/layers/柯幻熊猫_文生图_IP形象_参数面板花字透明层.png
            assets/derived/sites/柯幻熊猫/文生图/参数面板/stages/柯幻熊猫_文生图_IP形象_参数面板花字阶段1.png
            assets/derived/sites/柯幻熊猫/文生图/参数面板/stages/柯幻熊猫_文生图_IP形象_参数面板花字阶段2.png
      - name: Enforce pytest result
        if: always()
        run: test "${{ steps.pytest.outputs.status }}" = "0"
