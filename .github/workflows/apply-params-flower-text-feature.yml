name: Apply parameter flower-text feature

on:
  push:
    branches:
      - agent/params-flower-text-animation
  pull_request:
    branches:
      - master
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/params-flower-text-animation
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install media and CJK fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-noto-cjk
      - name: Install project
        run: python -m pip install -e '.[dev]'
      - name: Apply source migration and rebuild images
        run: python tools/apply_params_flower_text_feature.py
      - name: Compile
        continue-on-error: true
        run: python -m compileall -q video_agent tests
      - name: Ruff
        continue-on-error: true
        run: ruff check video_agent tests
      - name: Pytest
        continue-on-error: true
        run: pytest -q
      - name: Commit generated implementation and assets
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add video_agent tests assets/derived/sites/柯幻熊猫/文生图/参数面板
          git commit -m 'Implement parameter flower-text fade animation'
          git push origin HEAD:agent/params-flower-text-animation
