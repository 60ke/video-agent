name: Apply final flower-text compatibility fix

on:
  push:
    branches:
      - agent/params-flower-text-animation
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/params-flower-text-animation
          fetch-depth: 0
      - name: Preserve prompt compatibility
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('video_agent/assets/site_params_batch.py')
          text = path.read_text(encoding='utf-8')
          text = text.replace("当前功能为‘{source.feature}’。", "当前功能为\u201c{source.feature}\u201d。")
          text = text.replace("新增花字只能逐字写为‘{annotation.callout_text}’", "新增花字只能逐字写为\u201c{annotation.callout_text}\u201d")
          path.write_text(text, encoding='utf-8')
          PY
      - name: Commit compatibility fix
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add video_agent/assets/site_params_batch.py
          git diff --cached --quiet || git commit -m 'Fix parameter flower-text prompt compatibility'
          git push origin HEAD:agent/params-flower-text-animation
