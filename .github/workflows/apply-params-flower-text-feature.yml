name: Finalize parameter flower-text feature

on:
  push:
    branches:
      - agent/params-flower-text-animation
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/params-flower-text-animation
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install media and CJK fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-noto-cjk
      - name: Install project
        run: python -m pip install -e '.[dev]'
      - name: Preserve prompt compatibility
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('video_agent/assets/site_params_batch.py')
          text = path.read_text(encoding='utf-8')
          text = text.replace("当前功能为‘{source.feature}’。", "当前功能为“ + '“' + "{source.feature}" + '”' + "。")
          text = text.replace("新增花字只能逐字写为‘{annotation.callout_text}’", "新增花字只能逐字写为“ + '“' + "{annotation.callout_text}" + '”')
          path.write_text(text, encoding='utf-8')
          PY
      - name: Compile
        run: python -m compileall -q video_agent tests
      - name: Ruff
        run: ruff check video_agent tests
      - name: Pytest
        run: pytest -q
      - name: Upload IP previews
        uses: actions/upload-artifact@v4
        with:
          name: ip-params-flower-text-previews
          path: |
            assets/derived/sites/柯幻熊猫/文生图/参数面板/柯幻熊猫_文生图_IP形象_参数面板关键帧.png
            assets/derived/sites/柯幻熊猫/文生图/参数面板/layers/柯幻熊猫_文生图_IP形象_参数面板无花字底图.png
            assets/derived/sites/柯幻熊猫/文生图/参数面板/layers/柯幻熊猫_文生图_IP形象_参数面板花字透明层.png
            assets/derived/sites/柯幻熊猫/文生图/参数面板/stages/柯幻熊猫_文生图_IP形象_参数面板花字阶段1.png
            assets/derived/sites/柯幻熊猫/文生图/参数面板/stages/柯幻熊猫_文生图_IP形象_参数面板花字阶段2.png
      - name: Commit compatibility fix
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add video_agent/assets/site_params_batch.py
          git diff --cached --quiet || git commit -m 'Fix parameter flower-text prompt compatibility'
          git push origin HEAD:agent/params-flower-text-animation
